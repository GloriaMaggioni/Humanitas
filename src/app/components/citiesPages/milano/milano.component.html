    <div class="carousel  m-auto flex flex-col md:flex-row items-center rounded-lg gap-5 md:gap-5 overflow-hidden p-3 md:p-4 mb-6">
        @for( item of carousel; track $index){
            <img src="item.img" alt="{{item.name}}" class="w-32 h-40 md:w-38 md:h-43 lg:w-40 lg:h-40 rounded-lg flex-shrink-0  z-50">

            <div class="carousel-textSecondary">
                <h4>{{item.name}} {{item.bornDate}}{{item.deathDate}}</h4>
