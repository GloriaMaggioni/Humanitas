<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inika:wght@400;700&display=swap" rel="stylesheet">

<section class="homePage-container min-h-screen flex flex-col justify-between  p-4 md:p-6  ">

  <!-- CAROUSEL -->
  <div class="carousel w-[50%] h-[24%] m-auto mt-[2%]  flex items-center rounded-lg gap-5 overflow-hidden relative border border-blue-800"  >
    <img  src="assets/images/AldaMerini.jpg" alt=""  class="carousel-image w-48 h-40 ml-[8%] align-middle z-50 rounded-lg shrink">

    <div class="carousel-text-container  h-40 text-black z-50">
      <h3 class="carousel-citazione text-3xl text-balance  text-center italic">“L’ intelligenza senza la sensibilità non serve a niente”</h3>
      <div class="carousel-textSecondary flex flex-col mt-[8%]">
        <h4 class="carousel-nameCharacter mb-[1%] text-base font-medium">Alda Merini (1931 - 2009)</h4>
        <p class="carousel-professionText text-sm text-gray-600">Poetessa, aforista e scrittrice italiana</p>
      </div>
    </div>
  </div>

    <div class="userList-container  w-[80%] m-auto flex flex-col overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-sm border border-black/5">
      <table class="w-full text-sm text-left rtl:text-right text-body">
        
       <tbody>
        @for( user of users | slice:0:6; track $index){
           <tr class="  odd:bg-neutral-primary even:bg-neutral-secondary-soft border-b border-black/5  ">
                <th scope="row" class="px-6 py-4 font-medium text-heading whitespace-nowrap text-amber-600">
                   {{offset + $index + 1}}
                </th>
                <td class="px-6 py-4 hover:cursor-pointer" [routerLink]="['/utentPage']">
                   {{user.name}}
                 
                </td>
                <td class="px-6 py-4">
                    {{user.email}}
                </td>
                <td class="px-6 py-4">
                   {{user.gender}}
                </td>
                <td class="px-6 py-4">
                   {{user.status}}
                </td>
                <td class="px-6 py-4">
                    <button href="" class="font-medium text-fg-brand hover:text-white border border-black/5 hover:bg-red-600  hover:border-red-600 hover:cursor-pointer p-2 rounded-md" (click)="deleteUser(user.id)">Delete</button>
                </td>
            </tr>
       
       }
       </tbody>
      </table>

    </div>
            <button type="button" class="  p-2 m-auto rounded-md border border-amber-600 hover:bg-amber-600 hover:text-white hover:curor-pointer" [routerLink]="['/utents']">See more... </button>




   
   
 

</section>
