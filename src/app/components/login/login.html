<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alice&family=Inknut+Antiqua:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.x/dist/tailwind.min.css" rel="stylesheet">





<section class="login " >
    <div class="login-container">
      <div class="login-image-container">
          <div class="image-rectangle">
            <img src="assets/images/marcoaurelio.png" alt="">
            <p class="login-image-text">	“La felicità della tua vita dipende dalla qualità dei tuoi pensieri...
              abbi cura di non coltivare nozioni inadatte alla virtù e di natura ragionevole.” </p>
          </div>
      </div>
      <div class="login-form-container"> 
        <div class="logo-container">
          <img src="/assets/images/logo-blackGold.png" alt="" class="logo">
        </div>
        <div class="formGroup-container">
          <div class="form-title  ">Welcome</div>
          <div class="form  sm:py-3 md:py-4">
            <!-- START FORM  -->
                   <div class="flex w-full  justify-center mt-10">
                    <form action="#" class=" w-full space-y-4">
                      <!-- FULL NAME INPUT -->
                       <div class="mt-2">
                         <label for="" class="block mb-1 ">Full Name</label>
                         <input type="text" name="name" required autofocus="name" class="block w-full h-9 rounded-md px-3 py-3  bg-white outline-1 -outline-offset-1 outline-gray-300 text-base focus:outline-2 focus:-outline-offset-2 focus:outline-orange-500">
                       </div>
                       <!-- EMAIL INPUT -->
                        <div >
                          <label for="email" class="block mb-1 text-sm/6">Email</label>
                         <input type="email" name="email"  required autocomplete="email" class=" block w-full h-9 rounded-md px-3 py-3  bg-white outline-1 -outlone-offset-1 outline-gray-300 text-base focus:outline-2 focus:-outline-offset-2 focus:outline-orange-500">
                       </div>
                       <!-- PASSWORD INPUT -->
                         <div >
                          <label for="password" class="block mb-1 text-sm/6">Password</label>
                         <input type="password" name="password" required autocomplete="current-password" class="block w-full h-9 rounded-md px-3 py-3   bg-white outline-1 -outlone-offset-1 outline-gray-300 text-base focus:outline-2 focus:-outline-offset-2 focus:outline-orange-500">
                       </div>
                       <!-- BUTTONS -->
                        <div class="space-y-3">
                          <button type="submit" class="w-full h-9 justify-center rounded-md  px-3 py-4  bg-orange-500 font-semibold text-white hover:bg-orange-400 text-sm/6" >Sign in</button>
                       
                          <p class="text-gray-500 text-center">Oppure</p>
                       
                          <button type="submit" class="w-full h-9 rounded-md px-3 py-4  bg-orange-500 font-semibold text-white hover:bg-orange-400">Sign up</button>
                        </div>

                    </form>
                   </div>
             <!-- FINISH FORM -->
          </div>
        </div>
   
      </div>
  
    </div>
</section>
