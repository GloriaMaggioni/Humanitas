

<form  class="newPost-form w-full mt-2 border border-red-600" #newPostForm="ngForm">
    <div class="header">
       <h2 name="user-name" required  [attr.readonly]="true">{{newPost.name}} User name</h2>
       <p name="post-data" >{{newPost.data}} Post's date</p>
       
    </div>
  
<div class="flex items-center justify-center w-full">
    <label for="dropzone-file" class="flex flex-col items-center justify-center w-full h-40 bg-neutral-secondary-medium border border-dashed border-default-strong rounded-base cursor-pointer hover:bg-neutral-tertiary-medium">
        <div class="flex flex-col items-center justify-center text-body pt-5 pb-6">
            <svg class="w-8 h-8 mb-4" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24"><path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h3a3 3 0 0 0 0-6h-.025a5.56 5.56 0 0 0 .025-.5A5.5 5.5 0 0 0 7.207 9.021C7.137 9.017 7.071 9 7 9a4 4 0 1 0 0 8h2.167M12 19v-9m0 0-2 2m2-2 2 2"/></svg>
            <p class="mb-2 text-sm"><span class="font-semibold">Click to upload</span> or drag and drop</p>
            <p class="text-xs">SVG, PNG, JPG or GIF (MAX. 800x400px)</p>
        </div>
        <input id="dropzone-file" type="file" class="hidden" />
    </label>
</div> 


    <div class="post-description-container mt-4 border border-blue-600">
        <textarea name="post-description" id="post's description" class="w-full h-16" [ngModel]="newPost.description" placeholder="Description" required></textarea>
    </div>
    <div class="postbtn-container w-[50%] flex flex-row align-middle items-end mt-4  flex-auto border border-green-700">
         <button name="btn-cancel" class="p-1 rounded-md hover:cursor-pointer border border-green-600" (click)="postForm.reset()">Cancel</button>
        <button name="btn-share" class="p-1 mr-2 rounded-md hover: cursor-pointer border border-orange-600"[disabled]="!newPostForm.valid" (click)="addNewPost()">Share</button>
    </div>
</form>
