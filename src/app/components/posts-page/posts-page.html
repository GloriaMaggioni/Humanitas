<section class="post-page min-h-screen   p-4 md:p-6 border border-red-600">

    <div class="postList-container w-full flex align-middle flex-wrap border border-blue-700">
         @for(post of posts$ | async; track $index){
           <div class="bg-neutral-primary-soft block max-w-sm p-4 m-4 border border-black/5 rounded-md shadow-xs">
            <p>{{post.user_id}}</p>
               <h5 class="mb-3 text-2xl font-semibold tracking-tight text-heading leading-8">{{post.title}}</h5>
               <p class="text-body mb-6">{{post.body}}</p>
                <p class="text-body mb-6">Commento: {{post.comment}}</p>

                <button href="" class="font-medium text-fg-brand hover:text-white border border-black/5 hover:bg-red-600  hover:border-red-600 hover:cursor-pointer p-2 rounded-md" >Delete</button>

           </div>

    }

    </div>
   
</section>
