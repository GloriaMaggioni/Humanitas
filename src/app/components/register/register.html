<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alice&family=Inknut+Antiqua:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.x/dist/tailwind.min.css" rel="stylesheet">

<!-- MODIFICARE LE GRANDEZZE A SECONDA DELLE DIMENSIONI DELLO SCHERMO -->
  <!-- DA SISTEMARE  IL CONTROLLO DEL FORM -->


<section class="register-page">
    <div class="register-container inline-flex" >
        <div class="register-form-container">
            <div class="logo-container">
                <img src="/assets/images/logo-blackGold.png" alt="">
            </div>
            <div class="register-formGroup">
                <p class="form-title">Create your account</p>
                <div class="register-form flex min-h-full flex-col justify-center "> 
                    <!-- START FORM -->
                     <div class="flex w-full  justify-center mt-10">
                    <form action="#" class=" w-full space-y-4">
                        <!--  FULL NAME INPUTS -->
                          <div class=" fullName-container   mt-10 grid grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6  ">
                            <div class="first-name sm:col-span-3 ">
                                <label for="text" class="block  text-sm/6">First Name*</label>
                                <input type="text" name="firstName" required  class=" block w-full h-9 rounded-md px-3 py-3  mt-2 bg-white outline-1 -outlone-offset-1 outline-gray-300 text-base focus:outline-2 focus:-outline-offset-2 focus:outline-orange-500" >
                            </div>
                            <div class="last-name sm:col-span-3 ">
                                <label for="text" class="block  text-sm/6">Last Name*</label> <!-- LEGGERMENTE PIù CORTO DELL'ALTRO:DA SISTEMARE-->
                                <input type="text" name="lastName" required class=" block w-full mr-0  h-9 rounded-md px-3 py-3 mt-2 bg-white outline-1 -outlone-offset-1 outline-gray-300 text-base focus:outline-2 focus:-outline-offset-2 focus:outline-orange-500" >
                            </div>
                          </div>
                       <!-- EMAIL INPUT -->
                        <div  class=" grid-cols-1 col-span-full">
                          <label for="email" class="block  text-sm/6">Email*</label>
                         <input type="email" name="email"  required autocomplete="email" class=" block w-full h-9 rounded-md px-3 py-3  bg-white outline-1 -outlone-offset-1 outline-gray-300 text-base focus:outline-2 focus:-outline-offset-2 focus:outline-orange-500" >
                       </div>
                       <!-- PASSWORD INPUT -->
                         <div class="col-span-full">
                          <label for="password" class="block  text-sm/6">Password*</label>
                         <input type="password" name="password" required autocomplete="current-password" class="block w-full h-9 rounded-md px-3 py-3   bg-white outline-1 -outlone-offset-1 outline-gray-300 text-base focus:outline-2 focus:-outline-offset-2 focus:outline-orange-500" >
                       </div>
                       <!-- BUTTONS -->
                        <div class="space-y-3">
                          <button type="submit" class="w-full h-9 justify-center rounded-md  px-3 py-4  bg-orange-500  text-white hover:bg-orange-400 text-sm/6 register-btn" >Register</button>
                          <p>Already have an account? <a routerLink="/login" class=" text-red-600 italic ">Login</a></p>
                        </div>

                    </form>
                   </div>
                     <!-- END FORM -->
                </div>
            </div>
        </div>
         
        <div class="register-image-container ">
            <div class="image-rectangle relative w-fit h-fit">
              <img src="/assets/images/Aristotele-2.png" alt="">
              <p class="image-text absolute  z-3  text-white  text-sm/7 ">"Solo una mente educata può capire un pensiero diverso dal suo senza la necessità di accettarlo"</p>
            </div>
        </div>
    </div>
</section>
