<section class="utents-page min-h-screen flex flex-col justify-between p-4 md:p-6  border border-red-600">


  <h2>TABELLA DEGLI UTENTI</h2>
   

<table class="table-fixed">
  <thead>
    <tr>
      <th>Id</th>
      <th>Name</th>
      <th>Email</th>
      <th>Gender</th>
      <th>Status</th>

    </tr>
  </thead>
  <tbody>
    @for(user of users$ | async; track $index){
       <tr>
      <td>{{offset + $index + 1}}</td>
      <td>{{user.name}}</td>
      <td>{{user.email}}</td>
      <td>{{user.gender}}</td>
      <td>{{user.status}}</td>
       <button class="p-1 mb-1 rounded-sm hover:cursor-pointer hover:bg-red-600 hover:text-white border border-red-700" (click)="onDeleteUser(user.id)">Delete</button>
    </tr>

    }
   
   
  </tbody>
</table>



   
<div class="paginator-container m-auto mt-4 max-w-[80%] border border-blue-600">
  <app-paginator [currentPage]="currentPage" [totalNews]="totalUser" [newsPerPage]="limit"  (changePage)="onChangePage($event)"></app-paginator>
</div>

</section>
