<section class="utents-page min-h-screen flex flex-col justify-between  p-4 md:p-6  ">

<div class="relative overflow-x-auto bg-neutral-primary-soft shadow-xs rounded-sm border border-black/5">
    <table class="w-full text-sm text-left rtl:text-right text-body">
        <thead class="bg-neutral-secondary-soft border-b border-black/5">
            <tr>
                <th scope="col" class="px-6 py-3 font-medium">
                   Id
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                    Name
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                   Email
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                    Gender
                </th>
                <th scope="col" class="px-6 py-3 font-medium">
                    Status
                </th>
            </tr>
        </thead>
        <tbody>
          @for(user of users$ | async; track $index){
                <tr class="odd:bg-neutral-primary even:bg-neutral-secondary-soft border-b border-black/5 ">
                <th scope="row" class="px-6 py-4 font-medium text-heading whitespace-nowrap text-amber-600">
                   {{offset + $index + 1}}
                </th>
                <td class="px-6 py-4 border-b border-black/5">
                    <a href="" target="_blank">  {{user.name}}</a>
                 
                </td>
                <td class="px-6 py-4">
                    {{user.email}}
                </td>
                <td class="px-6 py-4">
                   {{user.gender}}
                </td>
                <td class="px-6 py-4">
                   {{user.status}}
                </td>
                <td class="px-6 py-4">
                    <button href="" class="font-medium text-fg-brand hover:text-white border border-black/5 hover:bg-red-600  hover:border-red-600 hover:cursor-pointer p-2 rounded-md" (click)="onDeleteUser(user.id)">Delete</button>
                </td>
            </tr>

          }
        

        </tbody>
    </table>
</div>




   
<div class="paginator-container m-auto mt-4  ">
  <app-paginator [currentPage]="currentPage" [totalNews]="totalUser" [newsPerPage]="limit"  (changePage)="onChangePage($event)"></app-paginator>
</div>

</section>
